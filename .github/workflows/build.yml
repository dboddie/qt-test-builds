name: test-builds
run-name: Build Qt Documentation
on: [push, workflow_dispatch]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Fetch dependencies
        run: |
          #apt-cache search libclang
          sudo apt-get install libclang-19-dev clang-19 ninja-build cmake libclang1-19
      - name: Clone the repository
        run: |
          git clone https://code.qt.io/qt/qt5.git qt6
          cd qt6
          git -c submodule."qtwebengine".update=none submodule update --init --recursive
          git submodule update --init qtwebengine
          echo 'HTML.nosubdirs = "true"' >> qtbase/doc/global/qt-module-defaults-online.qdocconf
          echo 'HTML.outputsubdir = "../html"' >> qtbase/doc/global/qt-module-defaults-online.qdocconf
      - name: Build
        run: |
          mkdir $GITHUB_WORKSPACE/qt6-build
          cd $GITHUB_WORKSPACE/qt6-build
          $GITHUB_WORKSPACE/qt6/configure -developer-build -opensource -submodules qtbase,qttools -no-opengl -prefix /tmp -- -DQT_BUILD_TESTS=ON -DQT_BUILD_TESTS_BY_DEFAULT=OFF
          ninja qdoc
          ninja generate_docs
          ls
      - name: Upload GitHub Pages artifacts
        id: deployment
        uses: actions/upload-pages-artifact@v3
        with:
          path: qt6-build/doc

  publish:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

